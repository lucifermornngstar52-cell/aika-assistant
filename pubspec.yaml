name: aika_assistant
description: Aika - Anime AI Assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # AI APIs
  google_generative_ai: ^0.4.3
  dart_openai: ^4.0.0
  
  # Speech & Voice
  speech_to_text: ^6.6.2
  flutter_tts: ^4.0.2
  
  # Animations
  rive: ^0.13.7
  lottie: ^3.1.2
  
  # UI & Effects
  glassmorphism: ^3.0.0
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  
  # Storage & State
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  
  # Utils
  permission_handler: ^11.3.1
  battery_plus: ^6.0.2
  connectivity_plus: ^6.0.5
  url_launcher: ^6.3.0
  android_intent_plus: ^4.0.2
  torch_light: ^1.0.1
  volume_controller: ^2.0.7
  
  # HTTP
  http: ^1.2.1
  
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
