<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:transparent !important;
    overflow:hidden;
  }
  #canvas { width:100%; height:100%; display:block; }
  #log {
    position:fixed; top:4px; left:4px; right:4px;
    color:#0ff; font-family:monospace; font-size:10px;
    pointer-events:none; text-shadow:0 1px 3px #000;
    white-space:pre-wrap; z-index:999;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="log">⏳ загрузка...</div>

<script>
const logEl = document.getElementById('log');
const lines = [];
function log(msg) {
  lines.push(msg);
  if (lines.length > 8) lines.shift();
  logEl.textContent = lines.join('\n');
  console.log('[L2D] ' + msg);
}
function hideLog() {
  setTimeout(() => { logEl.style.display = 'none'; }, 2000);
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error('Не загружен: ' + src));
    document.head.appendChild(s);
  });
}

let app = null, model = null, currentState = 'idle';

function fitModel() {
  if (!model || !app) return;
  try {
    const w = app.screen.width;
    const h = app.screen.height;
    model.x = w / 2;
    model.y = h * 0.58;
    const origW = model.internalModel.originalWidth || 1000;
    const origH = model.internalModel.originalHeight || 1000;
    const scaleX = w / origW;
    const scaleY = h / origH;
    const scale = Math.min(scaleX, scaleY) * 1.1;
    model.scale.set(scale);
  } catch(e) {}
}

async function initLive2D() {
  try {
    await loadScript('live2d/live2dcubismcore.min.js');
    log('✅ CubismCore');
    await loadScript('live2d/pixi.min.js');
    log('✅ PIXI v' + (typeof PIXI !== 'undefined' ? PIXI.VERSION : '?'));
    await loadScript('live2d/pixi-live2d-display.min.js');
    log('✅ pixi-live2d-display');

    app = new PIXI.Application({
      view: document.getElementById('canvas'),
      autoStart: true,
      backgroundAlpha: 0,
      transparent: true,
      resizeTo: window,
      antialias: true,
      resolution: window.devicePixelRatio || 1,
    });

    PIXI.live2d.Live2DModel.registerTicker(PIXI.Ticker);
    log('✅ PIXI app OK');

    // Загружаем Hiyori — официальная модель от Live2D
    await loadModelFromPath('models/Hiyori/Hiyori.model3.json');

  } catch(e) {
    log('❌ ' + (e.message || String(e)));
    console.error(e);
  }
}

async function loadModelFromPath(path) {
  log('Загрузка: ' + path);
  if (model) {
    try { app.stage.removeChild(model); model.destroy(); } catch(e) {}
    model = null;
  }
  try {
    model = await PIXI.live2d.Live2DModel.from(path, { autoInteract: false });
    app.stage.addChild(model);
    model.anchor.set(0.5, 0.5);
    fitModel();
    window.addEventListener('resize', fitModel);
    try { model.motion('Idle'); } catch(e) {}

    model.on('tap', () => {
      try { model.motion('TapBody'); } catch(e) {}
      try { window.flutter_inappwebview.callHandler('FlutterChannel', 'tap'); } catch(e) {}
    });

    log('✅ Модель загружена!');
    hideLog();
  } catch(e) {
    log('❌ loadModel: ' + (e.message || String(e)));
    console.error(e);
  }
}

// ── API для Flutter ──────────────────────────────────────────────
window.setAikaState = function(state) {
  currentState = state;
  if (!model) return;
  try {
    switch(state) {
      case 'listening':
      case 'thinking':
        model.motion('FlickHead');
        break;
      case 'dance':
      case 'greeting':
      case 'talking':
        model.motion('TapBody');
        break;
      default:
        model.motion('Idle');
    }
  } catch(e) {}
};

window.loadCustomModel = async function(url) {
  if (!app) return;
  await loadModelFromPath(url);
  window.setAikaState(currentState);
};

initLive2D();
</script>
</body>
</html>
