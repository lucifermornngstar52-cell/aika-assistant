<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:transparent !important; overflow:hidden; }
  #canvas { width:100%; height:100%; display:block; }
  #log {
    position:fixed; top:4px; left:4px; right:4px;
    color:#0ff; font-family:monospace; font-size:11px;
    pointer-events:none; text-shadow:0 0 4px #000;
    white-space:pre-wrap; z-index:999;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="log">⏳ Запуск...</div>
<script>
// ── Лог ────────────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
const lines = [];
function log(msg) {
  lines.push(msg);
  if (lines.length > 10) lines.shift();
  logEl.textContent = lines.join('\n');
  console.log('[L2D] ' + msg);
}
function hideLog() { setTimeout(() => { logEl.style.display='none'; }, 3000); }

// ── Базовый путь ────────────────────────────────────────────────────────
const BASE = (() => {
  try {
    // В InAppWebView href = file:///android_asset/flutter_assets/assets/live2d_viewer.html
    const href = window.location.href;
    const dir = href.substring(0, href.lastIndexOf('/') + 1);
    log('\u{1F4CD} base: ' + dir);
    return dir;
  } catch(e) {
    return 'file:///android_asset/flutter_assets/assets/';
  }
})();

let app = null, model = null, currentState = 'idle';

function fitModel() {
  if (!model || !app) return;
  try {
    const w = app.screen.width, h = app.screen.height;
    model.x = w / 2;
    model.y = h * 0.60;
    const origW = model.internalModel?.originalWidth || 1000;
    const origH = model.internalModel?.originalHeight || 1000;
    const scale = Math.min(w / origW, h / origH) * 1.15;
    model.scale.set(scale);
  } catch(e) {}
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => { console.log('[L2D] loaded: ' + src); resolve(); };
    s.onerror = () => reject(new Error('Failed: ' + src));
    document.head.appendChild(s);
  });
}

async function loadModelFromPath(path) {
  log('\u{1F504} ' + path.split('/').slice(-3).join('/'));
  if (model) {
    try { app.stage.removeChild(model); model.destroy(); } catch(e) {}
    model = null;
  }
  try {
    // Проверяем что PIXI.live2d доступен
    if (!window.PIXI || !PIXI.live2d || !PIXI.live2d.Live2DModel) {
      log('\u274C PIXI.live2d не готов!');
      return;
    }
    model = await PIXI.live2d.Live2DModel.from(path, { autoInteract: false });
    app.stage.addChild(model);
    model.anchor.set(0.5, 0.5);
    fitModel();
    window.addEventListener('resize', fitModel);
    try { model.motion('Idle'); } catch(e) {}
    model.on('pointerdown', () => {
      try { model.motion('TapBody'); } catch(e) {}
      try { window.flutter_inappwebview.callHandler('FlutterChannel', 'tap'); } catch(e) {}
    });
    log('\u2705 Модель загружена!');
    hideLog();
    try { window.flutter_inappwebview.callHandler('FlutterChannel', 'modelLoaded'); } catch(e) {}
  } catch(e) {
    log('\u274C loadModel: ' + (e.message || String(e)));
    console.error('[L2D] load error:', e);
  }
}

async function initLive2D() {
  try {
    // 1. Загружаем CubismCore
    await loadScript(BASE + 'live2d/live2dcubismcore.min.js');
    log('\u2705 CubismCore');

    // 2. Загружаем PIXI
    await loadScript(BASE + 'live2d/pixi.min.js');
    if (!window.PIXI) throw new Error('PIXI не определён после загрузки');
    log('\u2705 PIXI v' + PIXI.VERSION);

    // 3. Загружаем pixi-live2d-display
    await loadScript(BASE + 'live2d/pixi-live2d-display.min.js');
    if (!window.PIXI || !PIXI.live2d) throw new Error('PIXI.live2d не определён');
    log('\u2705 pixi-live2d-display');

    // 4. Создаём PIXI приложение ПЕРВЫМ
    app = new PIXI.Application({
      view: document.getElementById('canvas'),
      autoStart: true,
      backgroundAlpha: 0,
      transparent: true,
      resizeTo: window,
      antialias: true,
      resolution: window.devicePixelRatio || 1,
    });

    // 5. registerTicker ПОСЛЕ создания app и ПОСЛЕ загрузки pixi-live2d
    if (PIXI.live2d.Live2DModel.registerTicker) {
      PIXI.live2d.Live2DModel.registerTicker(PIXI.Ticker);
    }
    log('\u2705 App + Ticker OK');

    // 6. Загружаем дефолтную модель Hiyori
    const defaultModel = BASE + 'models/Hiyori/Hiyori.model3.json';
    await loadModelFromPath(defaultModel);

  } catch(e) {
    log('\u274C init: ' + (e.message || String(e)));
    console.error('[L2D] init error:', e);
  }
}

// ── API для Flutter ──────────────────────────────────────────────────────
window.setAikaState = function(state) {
  currentState = state;
  if (!model) return;
  try {
    switch(state) {
      case 'listening':
        try { model.expression && model.expression(0); } catch(e) {}
        break;
      case 'thinking':
        try { model.motion('FlickHead'); } catch(e) { model.motion('Idle'); }
        break;
      case 'dance':
      case 'greeting':
      case 'talking':
        try { model.motion('TapBody'); } catch(e) {}
        break;
      default:
        try { model.motion('Idle'); } catch(e) {}
    }
  } catch(e) {}
};

window.loadCustomModel = async function(url) {
  if (!app) { log('PIXI не готов'); return; }
  await loadModelFromPath(url);
};

window.switchBuiltinModel = async function(assetPath) {
  if (!app) { log('PIXI не готов'); return; }
  const modelUrl = BASE + assetPath;
  log('Переключаем модель: ' + assetPath);
  await loadModelFromPath(modelUrl);
};

// Старт
initLive2D();
</script>
</body>
</html>
