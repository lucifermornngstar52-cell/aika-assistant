<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:transparent !important;
    overflow:hidden;
  }
  #canvas {
    width:100%; height:100%;
    display:block;
    background:transparent;
  }
  #log {
    position:fixed; top:4px; left:4px; right:4px;
    color:#0ff; font-family:monospace; font-size:11px;
    pointer-events:none;
    text-shadow:0 0 4px #000;
    white-space:pre-wrap;
    z-index:999;
    background: rgba(0,0,0,0.4);
    border-radius: 4px;
    padding: 2px 4px;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="log">Init...</div>
<script>
// ─── Логгер ───────────────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
const logLines = [];
function log(msg) {
  const ts = new Date().toISOString().substr(11,8);
  logLines.push('[' + ts + '] ' + msg);
  if (logLines.length > 12) logLines.shift();
  logEl.textContent = logLines.join('\n');
  console.log('[L2D] ' + msg);
}
function hideLog() {
  setTimeout(() => { logEl.style.display = 'none'; }, 5000);
}

// ─── Базовый путь assets ───────────────────────────────────────────────────────
// Flutter InAppWebView загружает файл как:
//   file:///android_asset/flutter_assets/assets/live2d_viewer.html
// Поэтому BASE = .../assets/
const BASE = (function() {
  const href = window.location.href;
  // Убираем имя файла, оставляем директорию
  const base = href.substring(0, href.lastIndexOf('/') + 1);
  log('BASE: ' + base.replace('file:///android_asset/flutter_assets/', '...'));
  return base;
})();

// ─── Глобальное состояние ─────────────────────────────────────────────────────
let app = null;
let model = null;
let currentState = 'idle';

// ─── Загрузка скрипта ────────────────────────────────────────────────────────
function loadScript(src) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = function() { reject(new Error('Load failed: ' + src.split('/').pop())); };
    document.head.appendChild(s);
  });
}

// ─── Позиционирование модели ──────────────────────────────────────────────────
function fitModel() {
  if (!model || !app) return;
  try {
    var sw = app.screen.width;
    var sh = app.screen.height;
    model.x = sw * 0.5;
    model.y = sh * 0.65;
    var origW = (model.internalModel && model.internalModel.originalWidth) || 1000;
    var origH = (model.internalModel && model.internalModel.originalHeight) || 1000;
    var scale = Math.min(sw / origW, sh / origH) * 1.2;
    model.scale.set(scale);
    log('fit: ' + sw + 'x' + sh + ' scale=' + scale.toFixed(2));
  } catch(e) {
    log('fitModel err: ' + e.message);
  }
}

// ─── Загрузка модели ──────────────────────────────────────────────────────────
async function loadModelFromPath(path) {
  log('Loading: ' + path.split('/').slice(-3).join('/'));

  // Удаляем предыдущую модель
  if (model) {
    try { app.stage.removeChild(model); model.destroy(); } catch(e) {}
    model = null;
  }

  try {
    model = await PIXI.live2d.Live2DModel.from(path, {
      autoInteract: false,
      autoUpdate: true,
    });

    app.stage.addChild(model);
    model.anchor.set(0.5, 0.5);
    fitModel();

    window.removeEventListener('resize', fitModel);
    window.addEventListener('resize', fitModel);

    // Запускаем idle анимацию
    try { model.motion('Idle', undefined, PIXI.live2d.MotionPriority.IDLE); } catch(e) {}

    // Обработчик тапа по модели
    model.interactive = true;
    model.on('pointerdown', function() {
      try { model.motion('TapBody', undefined, PIXI.live2d.MotionPriority.NORMAL); } catch(e) {}
      try { window.flutter_inappwebview.callHandler('FlutterChannel', 'tap'); } catch(e) {}
    });

    log('Model ready!');
    hideLog();

    // Уведомляем Flutter что модель загружена
    try { window.flutter_inappwebview.callHandler('FlutterChannel', 'modelLoaded'); } catch(e) {}

    // Применяем текущее состояние
    window.setAikaState(currentState);

  } catch(e) {
    log('loadModel ERR: ' + (e.message || String(e)));
    console.error('[L2D] loadModel failed', e);
  }
}

// ─── Инициализация ────────────────────────────────────────────────────────────
async function initLive2D() {
  try {
    // 1. Cubism Core
    await loadScript(BASE + 'live2d/live2dcubismcore.min.js');
    log('CubismCore OK');

    // 2. PIXI — сохраняем/восстанавливаем module чтобы UMD шёл по window пути
    var _mod = window.module;
    var _exp = window.exports;
    window.module = undefined;
    window.exports = undefined;

    await loadScript(BASE + 'live2d/pixi.min.js');
    log('PIXI ' + (window.PIXI ? PIXI.VERSION : 'NOT FOUND'));

    if (!window.PIXI) {
      window.module = _mod;
      window.exports = _exp;
      throw new Error('PIXI not loaded');
    }

    // 3. pixi-live2d-display
    await loadScript(BASE + 'live2d/pixi-live2d-display.min.js');

    window.module = _mod;
    window.exports = _exp;

    if (!window.PIXI || !PIXI.live2d || !PIXI.live2d.Live2DModel) {
      log('PIXI.live2d=' + typeof(window.PIXI && PIXI.live2d));
      throw new Error('PIXI.live2d.Live2DModel not found');
    }
    log('pixi-live2d OK');

    // 4. PIXI Application
    app = new PIXI.Application({
      view: document.getElementById('canvas'),
      autoStart: true,
      backgroundAlpha: 0,
      transparent: true,
      resizeTo: window,
      antialias: true,
      resolution: window.devicePixelRatio || 1,
    });
    log('PIXI App created');

    // 5. Регистрируем ticker для анимаций
    try {
      PIXI.live2d.Live2DModel.registerTicker(PIXI.Ticker);
      log('Ticker OK');
    } catch(e) {
      log('Ticker warn: ' + e.message);
    }

    // 6. Загружаем модель по умолчанию (Hiyori)
    var defaultModel = BASE + 'models/Hiyori/Hiyori.model3.json';
    await loadModelFromPath(defaultModel);

  } catch(e) {
    log('INIT ERR: ' + (e.message || String(e)));
    console.error('[L2D] init failed', e);
  }
}

// ─── Flutter API ─────────────────────────────────────────────────────────────

window.setAikaState = function(state) {
  currentState = state || 'idle';
  if (!model) return;
  try {
    switch (state) {
      case 'listening':
        try { model.expression && model.expression(0); } catch(e) {}
        break;
      case 'thinking':
        try {
          model.motion('FlickHead', undefined, PIXI.live2d.MotionPriority.NORMAL);
        } catch(e) {
          try { model.motion('Idle'); } catch(e2) {}
        }
        break;
      case 'dance':
      case 'greeting':
      case 'talking':
        try { model.motion('TapBody', undefined, PIXI.live2d.MotionPriority.NORMAL); } catch(e) {}
        break;
      default:
        try { model.motion('Idle', undefined, PIXI.live2d.MotionPriority.IDLE); } catch(e) {}
        break;
    }
  } catch(e) {
    console.error('[L2D] setAikaState', e);
  }
};

window.loadCustomModel = async function(url) {
  if (!app) { log('app not ready'); return; }
  await loadModelFromPath(url);
};

window.switchBuiltinModel = async function(assetPath) {
  if (!app) { log('app not ready'); return; }
  log('Switch -> ' + assetPath);
  await loadModelFromPath(BASE + assetPath);
};

// ─── Старт ───────────────────────────────────────────────────────────────────
// Небольшая задержка — даём WebView время полностью прогрузиться
setTimeout(initLive2D, 300);
</script>
</body>
</html>
