<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:transparent !important; overflow:hidden; }
  #canvas { width:100%; height:100%; display:block; background:transparent !important; }
  #log {
    position:fixed; top:0; left:0; right:0; bottom:0;
    color:#0ff; font-family:monospace; font-size:9px;
    padding:4px; pointer-events:none; overflow:hidden;
    text-shadow: 0 1px 3px #000, 0 0 6px #000;
    white-space:pre-wrap; word-break:break-all;
  }
  #pick-btn {
    position:fixed; top:4px; right:4px;
    background:rgba(0,0,0,0.6); border:1px solid #0ff;
    color:#0ff; font-size:9px; padding:3px 7px;
    border-radius:8px; cursor:pointer; font-family:sans-serif; z-index:999;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="log">init...</div>
<button id="pick-btn" onclick="pickModel()">📂</button>

<script src="live2d/live2dcubismcore.min.js"
  onerror="log('❌ cubism load fail')"></script>
<script src="live2d/pixi.min.js"
  onerror="log('❌ pixi load fail')"></script>
<script src="live2d/pixi-live2d-display.min.js"
  onerror="log('❌ live2d-display load fail')"></script>

<script>
const logEl = document.getElementById('log');
const lines = [];
function log(msg) {
  lines.push(msg);
  if (lines.length > 12) lines.shift();
  logEl.textContent = lines.join('\n');
  console.log(msg);
}

function pickModel() {
  try { FlutterChannel.postMessage('pick_model'); } catch(e) {}
}

log('script start');
log('PIXI: ' + (typeof PIXI !== 'undefined' ? 'OK v'+PIXI.VERSION : 'MISSING'));
log('live2d: ' + (typeof PIXI !== 'undefined' && PIXI.live2d ? 'OK' : 'MISSING'));

let app = null, model = null, currentState = 'idle';

function initApp() {
  log('initApp...');
  try {
    app = new PIXI.Application({
      view: document.getElementById('canvas'),
      autoStart: true,
      backgroundAlpha: 0,
      transparent: true,
      resizeTo: window,
      antialias: true,
    });
    PIXI.live2d.Live2DModel.registerTicker(PIXI.Ticker);
    log('PIXI app OK');
    return true;
  } catch(e) {
    log('initApp ERR: ' + e.message);
    return false;
  }
}

async function loadModel(url) {
  log('loadModel: ' + url);
  if (model) {
    try { app.stage.removeChild(model); model.destroy(); } catch(e) {}
    model = null;
  }
  try {
    model = await PIXI.live2d.Live2DModel.from(url, { autoInteract: false });
    app.stage.addChild(model);
    model.anchor.set(0.5, 0.5);
    fitModel();
    try { model.motion('Idle'); } catch(e) {}
    log('✅ model loaded!');
    // Скрываем лог после успешной загрузки
    setTimeout(() => { logEl.style.display='none'; }, 3000);
    model.on('tap', () => {
      try { model.motion('TapBody'); } catch(e) {}
      try { FlutterChannel.postMessage('tap'); } catch(e) {}
    });
    window.addEventListener('resize', fitModel);
  } catch(e) {
    log('❌ loadModel ERR: ' + (e.message || String(e)));
    console.error(e);
  }
}

function fitModel() {
  if (!model || !app) return;
  try {
    model.position.set(app.screen.width/2, app.screen.height*0.55);
    const s = Math.min(app.screen.width, app.screen.height)
              / (model.internalModel.originalWidth || 200) * 0.9;
    model.scale.set(s);
  } catch(e) {}
}

window.setAikaState = function(state) {
  currentState = state;
  if (!model) return;
  try {
    if (state === 'listening' || state === 'thinking') model.motion('FlickHead');
    else if (state === 'dance' || state === 'greeting' || state === 'talking') model.motion('TapBody');
    else { model.motion('Idle'); }
  } catch(e) {}
};

window.loadCustomModel = async function(url) {
  await loadModel(url);
  window.setAikaState(currentState);
};

// Старт
(async () => {
  log('checking libs...');
  if (typeof PIXI === 'undefined') { log('FATAL: PIXI undefined'); return; }
  if (!PIXI.live2d)               { log('FATAL: no PIXI.live2d'); return; }
  if (!initApp()) return;
  // Грузим модель
  await loadModel('models/Haru/Haru.model3.json');
})();
</script>
</body>
</html>
