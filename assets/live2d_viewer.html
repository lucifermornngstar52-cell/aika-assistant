<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:transparent !important;
    overflow:hidden;
  }
  canvas { display:block; background:transparent !important; }
  #status {
    position:fixed; bottom:6px; left:0; right:0; text-align:center;
    color:rgba(0,229,255,0.75); font-family:sans-serif; font-size:10px;
    pointer-events:none;
  }
  #pick-btn {
    position:fixed; top:4px; right:4px;
    background:rgba(0,200,255,0.15); border:1px solid rgba(0,200,255,0.4);
    color:rgba(0,229,255,0.9); font-size:9px; padding:2px 6px;
    border-radius:8px; cursor:pointer; font-family:sans-serif;
    backdrop-filter:blur(4px);
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="status">Загрузка...</div>
<button id="pick-btn" onclick="window.FlutterChannel && FlutterChannel.postMessage('pick_model')">📂 Модель</button>

<!-- Live2D Cubism Core — грузится из assets (офлайн) -->
<script src="flutter_assets/assets/live2d/live2dcubismcore.min.js"></script>
<!-- PIXI.js -->
<script src="flutter_assets/assets/live2d/pixi.min.js"></script>
<!-- pixi-live2d-display -->
<script src="flutter_assets/assets/live2d/pixi-live2d-display.min.js"></script>

<script>
(async () => {
  const status = document.getElementById('status');
  let app, model;
  let currentState = 'idle';

  function initPixi() {
    if (app) { app.destroy(true); app = null; }
    app = new PIXI.Application({
      view: document.getElementById('canvas'),
      autoStart: true,
      backgroundAlpha: 0,
      transparent: true,
      resizeTo: window,
      antialias: true,
    });
    if (window.PIXI && window.PIXI.live2d) {
      PIXI.live2d.Live2DModel.registerTicker(PIXI.Ticker);
    }
  }

  async function loadModel(modelUrl) {
    if (model) {
      app.stage.removeChild(model);
      model.destroy();
      model = null;
    }

    try {
      status.textContent = 'Загрузка...';
      model = await PIXI.live2d.Live2DModel.from(modelUrl, { autoInteract: false });

      app.stage.addChild(model);
      model.anchor.set(0.5, 0.5);
      fitModel();
      playMotion('Idle');
      status.textContent = '';

      model.on('tap', (hitAreas) => {
        const area = hitAreas[0] || 'body';
        if (area === 'head') playMotion('FlickHead');
        else playMotion('TapBody');
        if (window.FlutterChannel) FlutterChannel.postMessage('tap');
      });

      window.addEventListener('resize', fitModel);
    } catch(e) {
      status.textContent = '❌ ' + (e.message || 'Ошибка загрузки');
      console.error('loadModel error:', e);
    }
  }

  function fitModel() {
    if (!model || !app) return;
    model.position.set(app.screen.width / 2, app.screen.height * 0.55);
    const scale = Math.min(app.screen.width, app.screen.height)
                  / model.internalModel.originalWidth * 0.9;
    model.scale.set(scale);
  }

  function playMotion(group) {
    if (!model) return;
    try { model.motion(group); } catch(e) {}
  }

  function playExpression(name) {
    if (!model) return;
    try { model.expression(name); } catch(e) {}
  }

  // ── Public API ─────────────────────────────────────────────────────
  window.setAikaState = function(state) {
    currentState = state;
    switch(state) {
      case 'listening':  playMotion('FlickHead'); break;
      case 'thinking':   playMotion('FlickHead'); playExpression('F04'); break;
      case 'talking':
      case 'greeting':
      case 'dance':      playMotion('TapBody'); break;
      case 'sad':        playExpression('F07'); break;
      default:           playMotion('Idle'); playExpression('F01'); break;
    }
  };

  window.loadCustomModel = async function(url) {
    status.textContent = 'Загрузка модели...';
    await loadModel(url);
    window.setAikaState(currentState);
  };

  // ── Инициализация ──────────────────────────────────────────────────
  initPixi();
  // Встроенная модель Haru
  await loadModel('flutter_assets/assets/models/Haru/Haru.model3.json');
})();
</script>
</body>
</html>
