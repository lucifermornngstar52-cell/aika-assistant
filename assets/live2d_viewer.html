<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:transparent !important; overflow:hidden; }
  #canvas { width:100%; height:100%; display:block; }
  #log {
    position:fixed; top:4px; left:4px; right:4px;
    color:#0ff; font-family:monospace; font-size:11px;
    pointer-events:none; text-shadow:0 0 4px #000;
    white-space:pre-wrap; z-index:999;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="log">Starting...</div>
<script>
const logEl = document.getElementById('log');
const lines = [];
function log(msg) {
  lines.push(msg);
  if (lines.length > 10) lines.shift();
  logEl.textContent = lines.join('\n');
  console.log('[L2D] ' + msg);
}
function hideLog() { setTimeout(() => { logEl.style.display='none'; }, 3000); }

// Базовый путь
const BASE = (() => {
  const href = window.location.href;
  const dir = href.substring(0, href.lastIndexOf('/') + 1);
  log('base: .../' + dir.split('/').slice(-2).join('/'));
  return dir;
})();

let app = null, model = null;

function fitModel() {
  if (!model || !app) return;
  try {
    const w = app.screen.width, h = app.screen.height;
    model.x = w / 2;
    model.y = h * 0.60;
    const origW = model.internalModel?.originalWidth || 1000;
    const origH = model.internalModel?.originalHeight || 1000;
    model.scale.set(Math.min(w / origW, h / origH) * 1.15);
  } catch(e) {}
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error('Cannot load: ' + src.split('/').pop()));
    document.head.appendChild(s);
  });
}

async function loadModelFromPath(path) {
  log('Loading: ' + path.split('/').slice(-3).join('/'));
  if (model) {
    try { app.stage.removeChild(model); model.destroy(); } catch(e) {}
    model = null;
  }
  try {
    model = await PIXI.live2d.Live2DModel.from(path, { autoInteract: false });
    app.stage.addChild(model);
    model.anchor.set(0.5, 0.5);
    fitModel();
    window.addEventListener('resize', fitModel);
    try { model.motion('Idle'); } catch(e) {}
    model.on('pointerdown', () => {
      try { model.motion('TapBody'); } catch(e) {}
      try { window.flutter_inappwebview.callHandler('FlutterChannel', 'tap'); } catch(e) {}
    });
    log('\u2705 Model ready!');
    hideLog();
    try { window.flutter_inappwebview.callHandler('FlutterChannel', 'modelLoaded'); } catch(e) {}
  } catch(e) {
    log('\u274C loadModel: ' + (e.message || e));
  }
}

async function initLive2D() {
  try {
    // 1. CubismCore
    await loadScript(BASE + 'live2d/live2dcubismcore.min.js');
    log('\u2705 CubismCore');

    // 2. PIXI
    // Убеждаемся что module/exports не мешают UMD
    const _module = window.module;
    const _exports = window.exports;
    window.module = undefined;
    window.exports = undefined;

    await loadScript(BASE + 'live2d/pixi.min.js');
    if (!window.PIXI) {
      // Восстанавливаем и пробуем ещё раз
      window.module = _module;
      window.exports = _exports;
      throw new Error('PIXI not found');
    }
    log('\u2705 PIXI v' + PIXI.VERSION);

    // 3. pixi-live2d-display (cubism4 browser bundle)
    // module уже undefined — UMD пойдёт по browser пути и запишет в window.PIXI.live2d
    await loadScript(BASE + 'live2d/pixi-live2d-display.min.js');
    
    // Восстанавливаем module/exports
    window.module = _module;
    window.exports = _exports;

    // Проверяем результат
    if (!window.PIXI || !PIXI.live2d || !PIXI.live2d.Live2DModel) {
      log('PIXI: ' + typeof window.PIXI);
      log('live2d: ' + typeof (PIXI.live2d));
      throw new Error('PIXI.live2d.Live2DModel not found');
    }
    log('\u2705 PIXI.live2d OK');

    // 4. Создаём Application
    app = new PIXI.Application({
      view: document.getElementById('canvas'),
      autoStart: true,
      backgroundAlpha: 0,
      transparent: true,
      resizeTo: window,
      antialias: true,
      resolution: window.devicePixelRatio || 1,
    });

    // 5. registerTicker
    try {
      PIXI.live2d.Live2DModel.registerTicker(PIXI.Ticker);
      log('\u2705 Ticker OK');
    } catch(e) {
      log('\u26A0 ticker: ' + e.message);
    }

    // 6. Загружаем модель
    await loadModelFromPath(BASE + 'models/Hiyori/Hiyori.model3.json');

  } catch(e) {
    log('\u274C init: ' + (e.message || e));
    console.error('[L2D]', e);
  }
}

// ── API для Flutter ──────────────────────────────────────────────────────
window.setAikaState = function(state) {
  if (!model) return;
  try {
    if (state === 'listening') {
      try { model.expression && model.expression(0); } catch(e) {}
    } else if (state === 'thinking') {
      try { model.motion('FlickHead'); } catch(e) { model.motion('Idle'); }
    } else if (['dance','greeting','talking'].includes(state)) {
      try { model.motion('TapBody'); } catch(e) {}
    } else {
      try { model.motion('Idle'); } catch(e) {}
    }
  } catch(e) {}
};

window.loadCustomModel = async (url) => {
  if (!app) return;
  await loadModelFromPath(url);
};

window.switchBuiltinModel = async (assetPath) => {
  if (!app) return;
  log('Switch: ' + assetPath);
  await loadModelFromPath(BASE + assetPath);
};

initLive2D();
</script>
</body>
</html>
