<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:transparent !important; overflow:hidden; }
  #canvas { width:100%; height:100%; display:block; }
  #log {
    position:fixed; top:4px; left:4px; right:4px;
    color:#0ff; font-family:monospace; font-size:11px;
    pointer-events:none; text-shadow:0 0 4px #000;
    white-space:pre-wrap; z-index:999;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="log">⏳ Запуск...</div>
<script>
// ── Лог ────────────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
const lines = [];
function log(msg) {
  lines.push(msg);
  if (lines.length > 10) lines.shift();
  logEl.textContent = lines.join('\n');
  console.log('[L2D] ' + msg);
}
function hideLog() { setTimeout(() => { logEl.style.display='none'; }, 3000); }

// ── Определяем базовый путь к assets ────────────────────────────────────
// В flutter_inappwebview initialFile HTML лежит в:
// android: file:///android_asset/flutter_assets/assets/live2d_viewer.html
// Значит модели лежат в: file:///android_asset/flutter_assets/assets/models/
const BASE = (() => {
  try {
    const url = document.currentScript
      ? document.currentScript.src
      : window.location.href;
    // Берём директорию HTML файла
    const dir = url.substring(0, url.lastIndexOf('/') + 1);
    log('📍 base: ' + dir);
    return dir;
  } catch(e) {
    // Fallback: стандартный путь Flutter asset
    return 'file:///android_asset/flutter_assets/assets/';
  }
})();

// Путь к модели относительно assets/
const MODEL_PATH = BASE + 'models/Hiyori/Hiyori.model3.json';

// ── Загрузка скриптов ───────────────────────────────────────────────────
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error('Не загружен: ' + src));
    document.head.appendChild(s);
  });
}

let app = null, model = null, currentState = 'idle';

function fitModel() {
  if (!model || !app) return;
  try {
    const w = app.screen.width, h = app.screen.height;
    model.x = w / 2;
    model.y = h * 0.60;
    const origW = model.internalModel?.originalWidth || 1000;
    const origH = model.internalModel?.originalHeight || 1000;
    const scale = Math.min(w / origW, h / origH) * 1.15;
    model.scale.set(scale);
  } catch(e) {}
}

async function initLive2D() {
  try {
    await loadScript(BASE + 'live2d/live2dcubismcore.min.js');
    log('✅ CubismCore');
    await loadScript(BASE + 'live2d/pixi.min.js');
    log('✅ PIXI v' + (typeof PIXI !== 'undefined' ? PIXI.VERSION : '?'));
    await loadScript(BASE + 'live2d/pixi-live2d-display.min.js');
    log('✅ pixi-live2d-display');

    app = new PIXI.Application({
      view: document.getElementById('canvas'),
      autoStart: true,
      backgroundAlpha: 0,
      transparent: true,
      resizeTo: window,
      antialias: true,
      resolution: window.devicePixelRatio || 1,
    });

    PIXI.live2d.Live2DModel.registerTicker(PIXI.Ticker);
    log('✅ PIXI app OK');

    await loadModelFromPath(MODEL_PATH);

  } catch(e) {
    log('❌ init: ' + (e.message || String(e)));
    console.error(e);
  }
}

async function loadModelFromPath(path) {
  log('🔄 Загрузка: ' + path.split('/').slice(-3).join('/'));
  if (model) {
    try { app.stage.removeChild(model); model.destroy(); } catch(e) {}
    model = null;
  }
  try {
    model = await PIXI.live2d.Live2DModel.from(path, { autoInteract: false });
    app.stage.addChild(model);
    model.anchor.set(0.5, 0.5);
    fitModel();
    window.addEventListener('resize', fitModel);

    // Запускаем idle анимацию
    try { model.motion('Idle'); } catch(e) {}

    model.on('pointerdown', () => {
      try { model.motion('TapBody'); } catch(e) {}
      try { window.flutter_inappwebview.callHandler('FlutterChannel', 'tap'); } catch(e) {}
    });

    log('✅ Модель загружена!');
    hideLog();

    // Сигнал Flutter что модель готова
    try {
      window.flutter_inappwebview.callHandler('FlutterChannel', 'modelLoaded');
    } catch(e) {}

  } catch(e) {
    log('❌ loadModel: ' + (e.message || String(e)));
    console.error('[L2D] load error:', e);
  }
}

// ── API для Flutter ──────────────────────────────────────────────────────
window.setAikaState = function(state) {
  currentState = state;
  if (!model) return;
  try {
    switch(state) {
      case 'listening':
        model.expression && model.expression(0);
        break;
      case 'thinking':
        try { model.motion('FlickHead'); } catch(e) { model.motion('Idle'); }
        break;
      case 'dance':
      case 'greeting':
      case 'talking':
        model.motion('TapBody');
        break;
      default:
        model.motion('Idle');
    }
  } catch(e) {}
};

window.loadCustomModel = async function(url) {
  if (!app) { log('PIXI не готов'); return; }
  await loadModelFromPath(url);
};

window.switchBuiltinModel = async function(assetPath) {
  if (!app) { log('PIXI не готов'); return; }
  // Строим URL относительно текущего расположения live2d_viewer.html
  const modelUrl = BASE + assetPath;
  log('Переключаем модель: ' + assetPath);
  await loadModelFromPath(modelUrl);
};

// Старт
initLive2D();
</script>
</body>
</html>
