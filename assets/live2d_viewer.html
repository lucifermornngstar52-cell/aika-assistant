<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:transparent !important;
    overflow:hidden;
  }
  #canvas { width:100%; height:100%; display:block; }
  #log {
    position:fixed; top:4px; left:4px; right:4px;
    color:#0ff; font-family:monospace; font-size:10px;
    pointer-events:none; text-shadow:0 1px 3px #000;
    white-space:pre-wrap; z-index:999;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="log">⏳ загрузка...</div>

<!-- flutter_inappwebview с initialFile открывает HTML из flutter_assets/ -->
<!-- Все пути ДОЛЖНЫ быть относительно папки assets/ -->
<script>
// Определяем BASE — flutter_inappwebview открывает как file:///android_asset/flutter_assets/
// Пути к скриптам и моделям — относительно расположения HTML файла
// HTML лежит в assets/live2d_viewer.html
// JS лежат в assets/live2d/
// Модель лежит в assets/models/Haru/

const logEl = document.getElementById('log');
const lines = [];
function log(msg) {
  lines.push(msg);
  if (lines.length > 8) lines.shift();
  logEl.textContent = lines.join('\n');
  console.log('[L2D] ' + msg);
}

function hideLog() {
  setTimeout(() => { logEl.style.display = 'none'; }, 2000);
}

log('Загрузка скриптов...');

// Динамическая загрузка скриптов по правильному пути
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error('Не загружен: ' + src));
    document.head.appendChild(s);
  });
}

let app = null, model = null, currentState = 'idle';

function fitModel() {
  if (!model || !app) return;
  try {
    const w = app.screen.width;
    const h = app.screen.height;
    model.x = w / 2;
    model.y = h * 0.6;
    const origW = model.internalModel.originalWidth || 224;
    const origH = model.internalModel.originalHeight || 224;
    const scale = Math.min(w / origW, h / origH) * 0.95;
    model.scale.set(scale);
  } catch(e) {}
}

async function initLive2D() {
  try {
    // Правильные пути: HTML лежит в assets/, скрипты в assets/live2d/
    await loadScript('live2d/live2dcubismcore.min.js');
    log('✅ CubismCore');

    await loadScript('live2d/pixi.min.js');
    log('✅ PIXI v' + (PIXI ? PIXI.VERSION : '?'));

    await loadScript('live2d/pixi-live2d-display.min.js');
    log('✅ pixi-live2d-display');

    // Инициализируем PIXI
    app = new PIXI.Application({
      view: document.getElementById('canvas'),
      autoStart: true,
      backgroundAlpha: 0,
      transparent: true,
      resizeTo: window,
      antialias: true,
      resolution: window.devicePixelRatio || 1,
    });

    PIXI.live2d.Live2DModel.registerTicker(PIXI.Ticker);
    log('✅ PIXI app создан');

    // Загружаем модель — путь относительно HTML файла
    log('Загрузка Haru...');
    model = await PIXI.live2d.Live2DModel.from(
      'models/Haru/Haru.model3.json',
      { autoInteract: false }
    );

    app.stage.addChild(model);
    model.anchor.set(0.5, 0.5);
    fitModel();
    window.addEventListener('resize', fitModel);

    // Запускаем idle анимацию
    try { model.motion('Idle'); } catch(e) {}

    // Обработка тапа
    model.on('tap', () => {
      try { model.motion('TapBody'); } catch(e) {}
      try { window.flutter_inappwebview.callHandler('FlutterChannel', 'tap'); } catch(e) {}
    });

    log('✅ Модель загружена!');
    hideLog();

  } catch(e) {
    log('❌ Ошибка: ' + (e.message || String(e)));
    console.error(e);
  }
}

// ── API для Flutter ──────────────────────────────────────────────
window.setAikaState = function(state) {
  currentState = state;
  if (!model) return;
  try {
    switch(state) {
      case 'listening':
      case 'thinking':
        model.motion('FlickHead');
        break;
      case 'dance':
      case 'greeting':
      case 'talking':
        model.motion('TapBody');
        break;
      default:
        model.motion('Idle');
    }
  } catch(e) {}
};

window.loadCustomModel = async function(url) {
  if (!app) return;
  if (model) {
    try { app.stage.removeChild(model); model.destroy(); } catch(e) {}
    model = null;
  }
  try {
    log('Загрузка кастомной модели...');
    model = await PIXI.live2d.Live2DModel.from(url, { autoInteract: false });
    app.stage.addChild(model);
    model.anchor.set(0.5, 0.5);
    fitModel();
    try { model.motion('Idle'); } catch(e) {}
    log('✅ Кастомная модель загружена!');
    hideLog();
    window.setAikaState(currentState);
  } catch(e) {
    log('❌ Кастомная модель: ' + e.message);
  }
};

// Запуск
initLive2D();
</script>
</body>
</html>
