name: Build Aika APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$(which flutter | sed 's|/bin/flutter||')" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Decode and create release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/android/app/release.keystore" >> $GITHUB_ENV
            echo "Release keystore created"
          else
            echo "No keystore secret, using debug signing"
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY \
            --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY

      - name: Get APK size
        run: |
          SIZE=$(du -sh build/app/outputs/flutter-apk/app-release.apk | cut -f1)
          echo "APK_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aika-release-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## Aika APK Built" >> $GITHUB_STEP_SUMMARY
          echo "- Size: $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- Run: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
