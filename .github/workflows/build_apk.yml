name: Build Aika APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Inject API keys
        run: |
          sed -i "s|GEMINI_API_KEY_HERE|${{ secrets.GEMINI_API_KEY }}|g" lib/services/ai_service.dart
          sed -i "s|OPENAI_API_KEY_HERE|${{ secrets.OPENAI_API_KEY }}|g" lib/services/ai_service.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: aika-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
